<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />

    <title>即時客戶 360 戰情室</title>
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      // Override Tailwind's teal palette to use CSS custom properties
      // so all teal-* utility classes respond to the active color theme.
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              teal: {
                50:  'var(--c-50)',
                100: 'var(--c-100)',
                200: 'var(--c-200)',
                300: 'var(--c-300)',
                400: 'var(--c-400)',
                500: 'var(--c-500)',
                600: 'var(--c-600)',
                700: 'var(--c-700)',
                800: 'var(--c-800)',
                900: 'var(--c-900)',
              },
              cyan: {
                400: 'var(--c2-400)',
                500: 'var(--c2-500)',
                600: 'var(--c2-500)',
              },
            },
          },
        },
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
